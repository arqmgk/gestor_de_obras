<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>API Tester</title>
<style>
  body { font-family: monospace; background: #0f1117; color: #e8e9ef; padding: 24px; }
  h2 { color: #4f8ef7; margin: 24px 0 8px; font-size: 14px; text-transform: uppercase; letter-spacing: 0.1em; }
  button { background: #252730; border: 1px solid #333; color: #e8e9ef; padding: 6px 14px; margin: 4px; cursor: pointer; border-radius: 4px; font-family: monospace; font-size: 13px; }
  button:hover { background: #1e2028; }
  pre { background: #161820; border: 1px solid #252730; padding: 14px; border-radius: 6px; font-size: 12px; white-space: pre-wrap; word-break: break-all; min-height: 40px; margin-top: 8px; color: #3ecf8e; }
  .err { color: #f26d6d; }
  input { background: #1e2028; border: 1px solid #333; color: #e8e9ef; padding: 6px 10px; border-radius: 4px; font-family: monospace; font-size: 13px; width: 60px; }
  label { font-size: 12px; color: #8b8d9a; margin-right: 6px; }
</style>
</head>
<body>

<h1 style="font-size:18px;margin-bottom:4px">gestor_de_obras — API Tester</h1>
<p style="color:#55576a;font-size:12px">Cada botón hace un fetch real y muestra la respuesta</p>

<h2>Obras</h2>
<button onclick="go('GET', '/api/obras')">GET /api/obras</button>
<button onclick="go('POST', '/api/obras', {nombre:'Obra test',direccion:'Calle falsa 123',estado:'planificada',fecha_inicio:'2025-01-01',fecha_fin:'2025-12-31'})">POST /api/obras (test)</button>
<label style="margin-left:12px">id:</label><input id="obra-id" value="1" />
<button onclick="go('GET', '/api/obras/'+document.getElementById('obra-id').value)">GET /api/obras/:id</button>
<button onclick="go('GET', '/api/obras/'+document.getElementById('obra-id').value+'/progreso')">GET /api/obras/:id/progreso</button>
<button onclick="go('GET', '/api/obras/'+document.getElementById('obra-id').value+'/tasks')">GET /api/obras/:id/tasks</button>
<button onclick="go('DELETE', '/api/obras/'+document.getElementById('obra-id').value)">DELETE /api/obras/:id</button>
<pre id="out-obras">—</pre>

<h2>Tasks</h2>
<button onclick="go('GET', '/api/tasks')">GET /api/tasks</button>
<button onclick="go('POST', '/api/tasks', {titulo:'Tarea test',estado:'pendiente',obraId:Number(document.getElementById('obra-id').value),prioridad:'media',unidad:'m2',cantidad_total:100})">POST /api/tasks (test)</button>
<label style="margin-left:12px">id:</label><input id="task-id" value="1" />
<button onclick="go('GET', '/api/tasks/'+document.getElementById('task-id').value)">GET /api/tasks/:id</button>
<button onclick="go('GET', '/api/tasks/'+document.getElementById('task-id').value+'/progreso')">GET /api/tasks/:id/progreso</button>
<button onclick="go('DELETE', '/api/tasks/'+document.getElementById('task-id').value)">DELETE /api/tasks/:id</button>
<pre id="out-tasks">—</pre>

<h2>Mediciones</h2>
<label>task id:</label><input id="med-task-id" value="1" />
<button onclick="go('GET', '/api/tasks/'+document.getElementById('med-task-id').value+'/mediciones')">GET mediciones</button>
<button onclick="go('POST', '/api/tasks/'+document.getElementById('med-task-id').value+'/mediciones', {cantidad:10,observaciones:'test'})">POST medición (10)</button>
<pre id="out-mediciones">—</pre>

<script>
const API = 'http://localhost:8000';

const outMap = {
  '/api/obras': 'out-obras',
  '/api/tasks': 'out-tasks',
  'mediciones': 'out-mediciones',
};

function getOut(url) {
  if (url.includes('mediciones')) return document.getElementById('out-mediciones');
  if (url.includes('/tasks')) return document.getElementById('out-tasks');
  return document.getElementById('out-obras');
}

async function go(method, path, body) {
  const out = getOut(path);
  out.textContent = 'cargando…';
  out.className = '';
  try {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (body) opts.body = JSON.stringify(body);
    const r = await fetch(API + path, opts);
    const data = await r.json();
    out.textContent = JSON.stringify(data, null, 2);
    if (!r.ok) out.className = 'err';
  } catch(e) {
    out.textContent = '❌ ' + e.message;
    out.className = 'err';
  }
}
</script>
</body>
</html>
